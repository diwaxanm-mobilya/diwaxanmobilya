<style>
  :root{
    --ink:#241a13; --charcoal:#5c4c3c; --cream:#faf6ee; --sand:#f4ecdd;
    --lava:#cba569; --lava-deep:#a9803f; --ember:#b5502e;
    --gold:#cba569; --gold-soft:#f4ecdd; --card:#FFFFFF; --line:#e6d9c3; --danger:#b5502e;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--cream);font-family:'Noto Sans Arabic', sans-serif;color:var(--ink);min-height:100vh;padding-bottom:60px;}
  .wrap{max-width:720px;margin:0 auto;padding:0 14px;}
  .hero{text-align:center;position:relative;margin:0 -14px 18px;padding:34px 20px 26px;background:radial-gradient(120% 160% at 50% -10%, #F0DAB8 0%, var(--cream) 65%);border-radius:0 0 32px 32px;box-shadow:0 10px 26px rgba(120,90,50,.10);overflow:hidden;}

  /* --- new: big collection banners (image + title + button, like a "Living Room" hero card) --- */
  .cat-banner{position:relative;margin:16px -14px;height:300px;overflow:hidden;display:flex;align-items:flex-end;justify-content:center;text-align:center;cursor:pointer;}
  .cat-banner img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;transition:transform .5s ease;}
  .cat-banner:hover img{transform:scale(1.04);}
  .cat-banner::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom, rgba(36,26,19,0) 35%, rgba(36,26,19,.62) 100%);z-index:1;}
  .cat-banner-content{position:relative;z-index:2;padding:0 20px 30px;display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;}
  .cat-banner-title{font-family:'Fraunces', serif;font-weight:600;font-size:28px;color:#fff;margin:0;text-shadow:0 2px 14px rgba(0,0,0,.3);}
  .cat-banner-btn{background:rgba(255,255,255,.96);color:var(--ink);border:none;font-family:inherit;font-weight:700;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;padding:13px 26px;cursor:pointer;}
  .cat-banner-btn:hover{background:#fff;}
  .cat-banner-slide{opacity:0;animation-name:catBannerFade;animation-timing-function:ease-in-out;animation-iteration-count:infinite;}
  @keyframes catBannerFade{0%{opacity:0;}6%{opacity:1;}25%{opacity:1;}31%{opacity:0;}100%{opacity:0;}}

  /* --- new: dedicated category page & "all products" page header --- */
  .page-header{padding:18px 4px 14px;text-align:center;}
  .back-btn{background:none;border:none;color:var(--lava-deep);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;padding:6px 4px;margin-bottom:6px;}
  .page-eyebrow{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--lava-deep);font-weight:700;margin:0 0 4px;}
  .page-title{font-family:'Fraunces', serif;font-weight:600;font-size:26px;color:var(--ink);margin:0;}
  .page-banner{position:relative;margin:14px -14px 4px;height:220px;overflow:hidden;border-radius:0;}
  .page-banner img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .all-search{width:100%;padding:13px 16px;border:1.5px solid var(--line);border-radius:12px;font-size:14px;font-family:inherit;background:var(--card);margin:6px 0 16px;}
  .all-search:focus{outline:none;border-color:var(--lava-deep);}
  .view-all-btn{display:block;width:100%;text-align:center;padding:15px;margin:6px 0 20px;background:var(--card);border:1.5px solid var(--ink);border-radius:12px;font-family:inherit;font-weight:700;font-size:12.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink);cursor:pointer;}
  .view-all-btn:hover{background:var(--ink);color:#fff;}

  /* --- new: wide banner image uploader in the category edit sheet --- */
  .banner-upload{border:1.5px dashed var(--line);border-radius:14px;overflow:hidden;background:var(--card);}
  .banner-upload .preview{width:100%;aspect-ratio:16/9;background:var(--sand);display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .banner-upload .preview img{width:100%;height:100%;object-fit:cover;display:block;}
  .banner-upload label.upload-btn{display:block;text-align:center;padding:11px 13px;font-size:13px;font-weight:600;color:var(--lava-deep);cursor:pointer;margin:0;}

  .hero::before{content:'';position:absolute;top:-40%;left:50%;width:220px;height:220px;transform:translateX(-50%);background:radial-gradient(circle, rgba(232,196,140,.55) 0%, rgba(232,196,140,0) 70%);pointer-events:none;}
  .lock-btn{position:absolute;top:16px;left:16px;background:rgba(255,255,255,.55);border:1px solid rgba(185,138,78,.35);color:var(--lava-deep);font-family:inherit;font-weight:600;font-size:11px;padding:7px 11px;border-radius:20px;cursor:pointer;backdrop-filter:blur(6px);}
  .lock-btn:hover{background:rgba(255,255,255,.8);}
  .settings-btn{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.55);border:1px solid rgba(185,138,78,.35);color:var(--lava-deep);font-family:inherit;font-weight:600;font-size:11px;padding:7px 11px;border-radius:20px;cursor:pointer;backdrop-filter:blur(6px);}
  .settings-btn:hover{background:rgba(255,255,255,.8);}
  .site-logo{position:relative;width:76px;height:76px;border-radius:50%;margin:0 auto 12px;overflow:hidden;background:rgba(255,255,255,.6);border:2px solid rgba(185,138,78,.35);display:flex;align-items:center;justify-content:center;}
  .site-logo img{width:100%;height:100%;object-fit:cover;display:block;}
  .social-row{position:relative;display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:16px;}
  .social-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.6);border:1px solid rgba(185,138,78,.3);color:var(--lava-deep);text-decoration:none;font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;backdrop-filter:blur(6px);}
  .social-pill:hover{background:rgba(255,255,255,.9);}
  .social-pill-icon{width:15px;height:15px;border-radius:50%;object-fit:cover;flex-shrink:0;}
  .ci-icon img.social-pill-icon{width:17px;height:17px;}
  .sli-icon img.social-pill-icon{width:18px;height:18px;}
  .settings-section-title{font-size:13px;font-weight:800;color:var(--lava-deep);margin:18px 0 8px;}
  .settings-section-title:first-child{margin-top:0;}
  .social-list-item{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px;}
  .social-list-item .sli-info{flex:1;min-width:0;}
  .social-list-item .sli-label{font-weight:600;font-size:13px;color:var(--ink);}
  .social-list-item .sli-url{font-size:11px;color:var(--charcoal);opacity:.6;word-break:break-all;}
  .social-list-item .sli-del{width:30px;height:30px;border-radius:8px;border:none;background:var(--sand);color:var(--danger);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:13px;}
  .hero .eng{position:relative;font-family:'Fraunces', serif;font-style:italic;font-weight:600;font-size:42px;letter-spacing:1px;margin:0;background:linear-gradient(90deg, var(--lava-deep), var(--ember), var(--lava-deep));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .hero .sub{position:relative;margin:8px 0 0;font-size:12px;font-weight:600;color:var(--charcoal);opacity:.85;letter-spacing:4px;text-transform:uppercase;}
  .swipe{position:relative;width:110px;height:3px;margin:16px auto 0;border-radius:50px;background:linear-gradient(90deg, transparent, var(--gold), var(--lava), var(--gold), transparent);background-size:200% 100%;animation:shimmer 4s ease-in-out infinite;}
  @keyframes shimmer{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
  .add-model-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin:6px 0 8px;padding:13px;border:2px dashed var(--lava);background:rgba(232,196,140,.15);color:var(--lava-deep);font-family:inherit;font-weight:600;font-size:15px;border-radius:14px;cursor:pointer;transition:.2s;}
  .add-model-btn:hover{background:rgba(232,93,47,.12);}
  .add-model-btn:active{transform:scale(.98);}
  .category{background:var(--card);border-radius:22px;margin:16px 0;box-shadow:0 6px 22px rgba(120,90,50,.08);overflow:hidden;border:1px solid var(--line);}
  .cat-head{padding:16px 18px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;position:relative;}
  .cat-head::before{content:'';position:absolute;top:0;right:18px;left:18px;height:3px;border-radius:0 0 4px 4px;background:linear-gradient(90deg, var(--gold), var(--lava));}
  .cat-titles{flex:1;min-width:0;}
  .cat-label{font-family:'Fraunces', serif;font-style:italic;font-weight:600;font-size:12px;color:var(--lava-deep);letter-spacing:1.5px;margin:0 0 2px;text-transform:uppercase;}
  .cat-name{font-size:20px;font-weight:800;margin:0;color:var(--ink);word-break:break-word;}
  .cat-actions{display:flex;gap:6px;flex-shrink:0;}
  .icon-btn{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:var(--cream);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--lava-deep);font-size:15px;transition:.15s;}
  .icon-btn:hover{background:var(--sand);}
  .icon-btn.danger{color:var(--danger);}
  .divider{height:1px;background:var(--line);margin:0 18px;}
  .products{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px 18px 18px;}
  .product{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;position:relative;box-shadow:0 2px 8px rgba(120,90,50,.06);transition:box-shadow .15s,transform .15s;}
  .product:hover{box-shadow:0 6px 16px rgba(120,90,50,.12);transform:translateY(-1px);}
  .product .img-box{width:100%;aspect-ratio:1/1;background:var(--sand);display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .product .img-box img{width:100%;height:100%;object-fit:cover;display:block;}
  .product .img-box .ph{font-size:26px;color:var(--lava);opacity:.5;}
  .product .info{padding:10px 11px 12px;}
  .product .p-type{font-size:12.5px;font-weight:600;color:var(--ink);margin:0 0 5px;line-height:1.35;}
  .product .p-price{font-size:13.5px;font-weight:800;color:var(--ink);margin:0;}
  .product .p-price::after{content:' دینار';font-size:10.5px;font-weight:600;color:var(--charcoal);opacity:.7;}
  .product .p-note{display:flex;align-items:flex-start;gap:4px;font-size:11px;color:var(--charcoal);opacity:.7;margin:5px 0 0;line-height:1.5;font-style:italic;word-break:break-word;}
  .product{cursor:pointer;}
  .product .prod-actions{position:absolute;top:6px;left:6px;display:flex;gap:4px;z-index:2;}
  .product .prod-actions button{width:24px;height:24px;border-radius:8px;background:rgba(120,90,50,.55);color:#fff;border:none;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;}
  .product .prod-actions button:hover{background:rgba(120,90,50,.75);}
  .pd-image{width:100%;aspect-ratio:1/1;border-radius:20px;overflow:hidden;background:var(--sand);margin-bottom:10px;display:flex;align-items:center;justify-content:center;}
  .pd-image img{width:100%;height:100%;object-fit:cover;display:block;}
  .pd-thumbs{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 4px;margin-bottom:14px;scrollbar-width:none;}
  .pd-thumbs::-webkit-scrollbar{display:none;}
  .pd-thumb{flex-shrink:0;width:52px;height:52px;border-radius:10px;overflow:hidden;border:2px solid transparent;padding:0;cursor:pointer;background:var(--sand);}
  .pd-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .pd-thumb.active{border-color:var(--lava-deep);}
  .pd-name{font-size:19px;font-weight:800;margin:0 0 6px;color:var(--ink);}
  .pd-price{font-size:18px;font-weight:800;color:var(--ink);margin:0 0 12px;}
  .pd-price::after{content:' دینار';font-size:12px;font-weight:600;opacity:.75;}
  .pd-note{font-size:14px;color:var(--charcoal);line-height:1.8;background:var(--sand);border-radius:12px;padding:12px 14px;margin:0 0 14px;word-break:break-word;}
  .pd-download{display:block;text-align:center;text-decoration:none;background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:12px;font-weight:600;font-size:14px;color:var(--lava-deep);}
  .add-product{background:var(--card);border:2px dashed var(--line);border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--lava-deep);font-weight:600;font-size:13px;cursor:pointer;min-height:100%;padding:14px 6px;}
  .add-product .plus{font-size:24px;line-height:1;}
  .add-product:hover{background:var(--sand);}
  .load-more-btn{display:block;width:calc(100% - 36px);margin:0 18px 16px;padding:11px;border:1.5px solid var(--line);background:var(--card);color:var(--lava-deep);font-family:inherit;font-weight:600;font-size:13px;border-radius:12px;cursor:pointer;}
  .load-more-btn:hover{background:var(--sand);}
  .load-more-btn:disabled{opacity:.6;cursor:default;}
  .empty-cats{text-align:center;color:var(--lava-deep);opacity:.75;padding:40px 10px;font-size:14px;line-height:1.9;}
  .overlay{position:fixed;inset:0;background:rgba(120,90,50,.5);display:flex;align-items:flex-end;justify-content:center;z-index:50;}
  .sheet{background:var(--cream);width:100%;max-width:480px;border-radius:26px 26px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;}
  .sheet h3{font-family:'Fraunces', serif;font-style:italic;margin:0 0 16px;font-size:21px;color:var(--ink);}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--lava-deep);margin-bottom:6px;}
  .field input[type=text], .field input[type=password], .field input[type=number], .field textarea{width:100%;padding:11px 13px;border-radius:11px;border:1.5px solid var(--line);background:var(--card);font-family:inherit;font-size:15px;color:var(--ink);resize:vertical;}
  .field input:focus, .field textarea:focus{outline:none;border-color:var(--lava);}
  .field .hint{font-size:11px;color:var(--charcoal);opacity:.55;margin:5px 2px 0;}
  .field-check{display:flex;align-items:center;gap:10px;background:var(--sand);border-radius:12px;padding:12px 14px;cursor:pointer;font-size:13px;font-weight:600;color:var(--ink);}
  .field-check input{width:18px;height:18px;accent-color:var(--lava-deep);flex-shrink:0;cursor:pointer;}
  .img-upload{display:flex;align-items:center;gap:12px;}
  .img-upload .preview{width:64px;height:64px;border-radius:12px;background:var(--card);border:1.5px dashed var(--line);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
  .img-upload .preview img{width:100%;height:100%;object-fit:cover;}
  .img-upload label.upload-btn{flex:1;background:var(--card);border:1.5px solid var(--line);border-radius:11px;padding:11px 13px;text-align:center;font-size:13px;font-weight:600;color:var(--lava-deep);cursor:pointer;margin:0;}
  .gallery-grid{display:grid;grid-template-columns:repeat(3, 1fr);gap:10px;}
  .gallery-thumb{position:relative;aspect-ratio:1/1;border-radius:12px;overflow:hidden;border:1px solid var(--line);background:var(--sand);}
  .gallery-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .gallery-thumb-del{position:absolute;top:4px;left:4px;width:22px;height:22px;border-radius:7px;background:rgba(34,34,34,.6);color:#fff;border:none;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .gallery-add{aspect-ratio:1/1;border-radius:12px;border:2px dashed var(--line);background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--lava-deep);cursor:pointer;text-align:center;}
  .gallery-add:hover{background:var(--sand);}
  .sheet-actions{display:flex;gap:10px;margin-top:18px;}
  .btn{flex:1;padding:13px;border-radius:12px;border:none;font-family:inherit;font-weight:800;font-size:15px;cursor:pointer;}
  .btn-primary{background:linear-gradient(90deg, var(--lava-deep), var(--lava));color:#fff;}
  .btn-primary:disabled{opacity:.5;}
  .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line);}
  .status{text-align:center;font-size:12px;color:var(--lava-deep);opacity:.7;padding:10px 0 0;}
  .error{color:var(--danger);font-size:12px;margin-top:6px;font-weight:600;}

  /* --- new: hero tagline + CTA --- */
  .hero-tagline{position:relative;font-size:14px;color:var(--charcoal);opacity:.95;margin:12px auto 0;line-height:1.7;max-width:260px;font-weight:600;}
  .hero-cta{position:relative;display:inline-flex;align-items:center;gap:6px;background:linear-gradient(90deg,var(--lava-deep),var(--gold));color:#fff;font-family:inherit;font-weight:800;font-size:13px;padding:10px 24px;border-radius:30px;border:none;cursor:pointer;margin-top:14px;box-shadow:0 6px 16px rgba(185,138,78,.35);}
  .hero-cta:active{transform:scale(.97);}

  /* --- new: top-right button group (settings + wishlist) --- */
  .top-right-group{position:absolute;top:16px;right:16px;display:flex;gap:8px;align-items:center;z-index:2;}
  .top-right-group .settings-btn, .top-right-group .wishlist-btn{position:static;}
  .wishlist-btn{background:rgba(255,255,255,.55);border:1px solid rgba(185,138,78,.35);color:var(--lava-deep);font-family:inherit;font-weight:600;font-size:12px;padding:7px 11px;border-radius:20px;cursor:pointer;backdrop-filter:blur(6px);display:flex;align-items:center;gap:4px;}
  .wishlist-btn:hover{background:rgba(255,255,255,.85);}

  /* --- new: category icon strip --- */
  .cat-scroll{display:flex;gap:14px;overflow-x:auto;padding:4px 4px 10px;margin:0 -14px 6px;padding-inline:18px;scrollbar-width:none;}
  .cat-scroll::-webkit-scrollbar{display:none;}
  .cat-pill{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:6px;background:none;border:none;font-family:inherit;cursor:pointer;width:64px;}
  .cat-pill-icon{width:52px;height:52px;border-radius:50%;background:var(--card);border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 12px rgba(120,90,50,.06);overflow:hidden;}
  .cat-pill-icon img{width:100%;height:100%;object-fit:cover;display:block;}
  .cat-pill-label{font-size:11.5px;font-weight:600;color:var(--charcoal);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:64px;}

  /* --- new: horizontal scroll sections (new arrivals / related) --- */
  .section-block{margin:20px 0;}
  .section-head{display:flex;align-items:baseline;justify-content:space-between;padding:0 18px;margin-bottom:10px;}
  .section-title{font-family:'Fraunces', serif;font-style:italic;font-weight:600;font-size:17px;color:var(--ink);margin:0;}
  .hscroll{display:flex;gap:12px;overflow-x:auto;padding:2px 18px 8px;scrollbar-width:none;}
  .hscroll::-webkit-scrollbar{display:none;}
  .hcard{flex-shrink:0;width:128px;background:var(--card);border-radius:18px;border:1px solid var(--line);overflow:hidden;position:relative;cursor:pointer;box-shadow:0 2px 8px rgba(120,90,50,.06);}
  .hcard-img{width:100%;aspect-ratio:1/1;background:var(--sand);display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .hcard-img img{width:100%;height:100%;object-fit:cover;display:block;}
  .hcard .ph{font-size:22px;color:var(--lava);opacity:.5;}
  .hcard-name{font-size:12px;font-weight:600;color:var(--ink);margin:8px 8px 3px;line-height:1.3;}
  .hcard-price{font-size:12.5px;font-weight:800;color:var(--ink);margin:0 8px 9px;}
  .hcard-price::after{content:' دینار';font-size:9.5px;font-weight:600;color:var(--charcoal);opacity:.7;}
  .new-badge{position:absolute;top:6px;right:6px;background:var(--ink);color:var(--gold-soft);font-size:9px;font-weight:800;padding:3px 7px;border-radius:8px;letter-spacing:.5px;z-index:2;}
  .hcard-heart{position:absolute;top:6px;left:6px;width:27px;height:27px;border-radius:50%;background:rgba(255,255,255,.92);border:1px solid rgba(185,138,78,.25);box-shadow:0 2px 5px rgba(120,90,50,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2;}

  /* --- new: wishlist heart on product grid cards --- */
  .wish-heart{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.92);border:1px solid rgba(185,138,78,.25);box-shadow:0 2px 5px rgba(120,90,50,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2;}
  .heart-ic{width:14px;height:14px;fill:none;stroke:var(--lava-deep);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .heart-ic-active{fill:var(--danger);stroke:var(--danger);}

  /* --- new: wishlist sheet list --- */
  .wish-item{display:flex;align-items:center;gap:10px;background:var(--sand);border-radius:12px;padding:8px 10px;margin-bottom:8px;}
  .wish-img{width:44px;height:44px;border-radius:10px;background:var(--card);overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .wish-img img{width:100%;height:100%;object-fit:cover;}
  .wish-info{flex:1;min-width:0;}
  .wish-name{font-size:13px;font-weight:600;margin:0 0 2px;color:var(--ink);}
  .wish-price{font-size:12px;font-weight:800;color:var(--ink);margin:0;}
  .wish-price::after{content:' دینار';font-size:9px;font-weight:600;opacity:.75;}

  /* --- new: product detail benefits checklist --- */
  .pd-benefits{background:var(--sand);border-radius:12px;padding:12px 14px;margin:0 0 14px;}
  .pd-benefits-title{font-size:13px;font-weight:800;color:var(--lava-deep);margin:0 0 8px;}
  .pd-benefits-list{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:6px;}
  .pd-benefits-list li{font-size:13.5px;color:var(--charcoal);line-height:1.5;}
  .pd-heart{background:var(--card);border:1.5px solid var(--line);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
  .pd-heart .heart-ic{width:18px;height:18px;}

  /* --- new: hamburger menu drawer --- */
  .menu-sheet-header{display:flex;align-items:center;gap:10px;margin:0 0 18px;}
  .menu-sheet-header .msh-badge{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg, var(--lava), var(--lava-deep));display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 10px rgba(185,138,78,.3);}
  .menu-sheet-header .msh-badge svg{width:19px;height:19px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .menu-sheet-header h3{margin:0;}
  .menu-list{display:flex;flex-direction:column;gap:7px;margin-bottom:8px;}
  .menu-item{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 12px;font-family:inherit;font-size:14px;font-weight:600;color:var(--ink);cursor:pointer;text-align:right;width:100%;box-shadow:0 1px 4px rgba(120,90,50,.05);transition:background .15s,border-color .15s,transform .15s,box-shadow .15s;}
  .menu-item:hover{background:var(--gold-soft);border-color:var(--gold);transform:translateY(-1px);box-shadow:0 4px 12px rgba(120,90,50,.14);}
  .menu-item:active{transform:translateY(0);}
  .menu-item .mi-icon{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:var(--sand);color:var(--lava-deep);flex-shrink:0;}
  .menu-item .mi-icon svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .menu-item.mi-danger .mi-icon{background:rgba(192,57,43,.1);color:var(--danger);}
  .menu-item .mi-label{flex:1;}
  .menu-item .mi-chevron{width:16px;height:16px;color:var(--charcoal);opacity:.45;flex-shrink:0;}
  .menu-item .mi-chevron svg{width:100%;height:100%;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .menu-divider{height:1px;background:var(--line);margin:10px 2px;}
  .menu-socials{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:4px;}

  /* --- new: brand pills + brand tag on cards --- */
  .brand-pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .brand-pill{background:var(--sand);border:1px solid var(--line);border-radius:20px;padding:8px 16px;font-family:inherit;font-size:13px;font-weight:600;color:var(--lava-deep);cursor:pointer;}
  .brand-pill.active, .brand-pill:hover{background:var(--gold);color:#fff;border-color:var(--gold);}
  .p-brand{font-size:10.5px;font-weight:600;color:var(--lava-deep);opacity:.85;margin:0 0 2px;text-transform:uppercase;letter-spacing:.4px;}
  .pd-brand{font-size:12px;font-weight:800;color:var(--lava-deep);margin:0 0 3px;text-transform:uppercase;letter-spacing:.4px;}

  /* --- new: contact list --- */
  .contact-list{display:flex;flex-direction:column;gap:8px;}
  .contact-item{display:flex;align-items:center;gap:12px;background:var(--sand);border-radius:14px;padding:12px 14px;text-decoration:none;color:var(--ink);font-weight:600;font-size:13.5px;}
  .contact-item:hover{background:var(--gold-soft);}
  .contact-item .ci-icon{font-size:17px;}


  .promo-wrap{text-align:center;margin:20px -14px 0;padding:22px 14px;background:#161616;}
  .promo-trigger{display:inline-flex;align-items:center;gap:6px;background:transparent;color:var(--gold-soft);border:1px solid rgba(233,205,142,.35);font-family:inherit;font-weight:600;font-size:12px;padding:9px 18px;border-radius:30px;cursor:pointer;box-shadow:none;}
  .promo-trigger:hover{background:rgba(233,205,142,.12);}
  .promo-sheet{text-align:center;}
  .promo-sheet .promo-title{font-family:'Playfair Display', serif;font-style:italic;font-weight:600;font-size:17px;color:var(--ink);margin:0 0 8px;}
  .promo-sheet .promo-sub{font-size:12.5px;color:var(--charcoal);opacity:.75;margin:0 0 16px;line-height:1.8;}
  .promo-sheet .promo-links{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:6px;}
  .promo-sheet .promo-pill{display:inline-flex;align-items:center;gap:5px;background:var(--sand);border:1px solid var(--line);color:var(--lava-deep);text-decoration:none;font-size:13px;font-weight:600;padding:8px 15px;border-radius:20px;}
  .promo-sheet .promo-pill:hover{background:var(--gold-soft);}

  .promo-sheet .promo-icon{font-size:30px;margin-bottom:2px;}
  .promo-sheet .promo-hello{font-size:13px;color:var(--lava-deep);font-weight:600;margin:0 0 2px;}
  .promo-sheet .promo-brand{font-family:'Playfair Display', serif;font-style:italic;font-weight:600;font-size:19px;color:var(--ink);margin:0 0 4px;}
  .promo-sheet .promo-desc{font-size:12.5px;color:var(--charcoal);opacity:.8;margin:0;line-height:1.7;}
  .promo-sheet .promo-divider{height:1px;background:var(--line);margin:14px 0;}
  .promo-sheet .promo-section-title{font-size:13px;font-weight:800;color:var(--ink);margin:0 0 10px;display:flex;align-items:center;justify-content:center;gap:6px;}
  .promo-sheet .promo-list{list-style:none;margin:0 auto 4px;padding:0;text-align:right;display:inline-flex;flex-direction:column;gap:7px;}
  .promo-sheet .promo-list li{font-size:12.5px;color:var(--charcoal);display:flex;align-items:center;gap:7px;}
  .promo-sheet .promo-list li::before{content:'✔';color:var(--lava-deep);font-size:11px;font-weight:800;}
  .promo-sheet .promo-tags{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:4px 0 2px;}
  .promo-sheet .promo-tag{background:var(--sand);border:1px solid var(--line);color:var(--ink);font-size:12px;font-weight:600;padding:6px 13px;border-radius:20px;}
  .promo-sheet .promo-order-btn{display:block;width:100%;background:linear-gradient(135deg, var(--lava-deep), var(--lava));color:#fff;border:none;font-family:inherit;font-weight:800;font-size:14px;padding:13px;border-radius:16px;cursor:pointer;box-shadow:0 6px 16px rgba(185,138,78,.35);margin-top:6px;text-decoration:none;text-align:center;}
  .promo-sheet .promo-order-btn:hover{filter:brightness(1.05);}

  /* --- new: dark mode --- */
  html[data-theme="dark"]{
    --ink:#f2e9d8; --charcoal:#b8a68e; --cream:#0d0a07; --sand:#17110b;
    --lava:#cba569; --lava-deep:#cba569; --ember:#d98a63;
    --gold:#cba569; --gold-soft:#241a10; --card:#130e08; --line:#2b2115; --danger:#e07a5f;
  }
  html[data-theme="dark"] .hero{background:radial-gradient(130% 170% at 50% -15%, #1e1509 0%, var(--cream) 62%);box-shadow:none;}
  html[data-theme="dark"] .wishlist-btn{background:rgba(36,26,19,.55);border-color:rgba(203,165,105,.35);color:var(--gold);}
  html[data-theme="dark"] .wishlist-btn:hover{background:rgba(36,26,19,.85);}
  html[data-theme="dark"] .cat-banner-btn{background:rgba(255,255,255,.92);color:#241a13;}
  html[data-theme="dark"] .btn-primary{color:#241a13;}
  html[data-theme="dark"] .hcard-heart, html[data-theme="dark"] .wish-heart, html[data-theme="dark"] .pd-heart{background:rgba(36,26,19,.88);border-color:rgba(203,165,105,.3);}

  /* --- new: option lists for theme/language pickers --- */
  .opt-list{display:flex;flex-direction:column;gap:8px;margin:6px 0 16px;}
  .opt-item{display:flex;align-items:center;gap:10px;background:var(--sand);border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;color:var(--ink);width:100%;text-align:right;}
  .opt-item.active{border-color:var(--gold);background:var(--gold-soft);}
  .opt-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;background:transparent;}
  .opt-item.active .opt-dot{border-color:var(--gold);background:var(--gold);}
  .opt-item .opt-label{flex:1;}
  .sheet-sub{text-align:center;font-size:12.5px;color:var(--charcoal);opacity:.8;margin:-6px 0 12px;}

  /* --- new: about-us content --- */
  .about-text{font-size:14px;color:var(--ink);line-height:1.9;white-space:pre-wrap;margin:0 0 14px;}
  .about-img-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
  .about-img-grid img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:12px;display:block;border:1px solid var(--line);}
  .about-video{width:100%;aspect-ratio:16/9;border:none;border-radius:12px;margin-bottom:10px;background:#000;display:block;}
  .about-edit-thumb{position:relative;}
  .about-edit-thumb .gallery-thumb-del{z-index:2;}
  .video-row{display:flex;align-items:center;gap:8px;background:var(--sand);border-radius:10px;padding:8px 10px;margin-bottom:8px;font-size:12px;color:var(--charcoal);}
  .video-row .vr-url{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;direction:ltr;text-align:left;}
  .video-row button{background:none;border:none;color:var(--danger);cursor:pointer;font-size:13px;flex-shrink:0;}

  /* ============================================================
     LUXE REDESIGN LAYER — refined, gallery-like look
     (overrides the base styles above; keep this section last)
     ============================================================ */

  /* --- hero: flat ivory, oversized serif brand, hairline base --- */
  .hero{background:var(--cream);border-radius:0;box-shadow:none;border-bottom:1px solid var(--line);padding:64px 20px 44px;margin:0 -14px 4px;}
  .hero .eng{font-size:46px;letter-spacing:.5px;color:var(--ink);}
  .hero .sub{letter-spacing:8px;font-size:11.5px;color:var(--lava-deep);}
  .hero-tagline{max-width:310px;font-weight:500;color:var(--charcoal);opacity:.85;}
  .swipe{width:64px;height:1px;margin:18px auto 0;border-radius:0;background:var(--gold);animation:none;}
  .hero-cta{background:transparent;color:var(--ink);border:1px solid var(--gold);border-radius:0;box-shadow:none;letter-spacing:2.5px;text-transform:uppercase;font-size:11px;font-weight:700;padding:14px 32px;margin-top:22px;}
  .hero-cta:hover{background:var(--gold);color:#fff;}
  .hero-cta:active{transform:none;opacity:.85;}
  html[data-theme="dark"] .hero-cta:hover{color:#241a13;}

  /* --- header chips (menu / wishlist / settings): quiet outline, square --- */
  .lock-btn, .wishlist-btn, .settings-btn{background:transparent;border:1px solid var(--line);border-radius:0;color:var(--ink);letter-spacing:1.5px;font-size:10.5px;text-transform:uppercase;font-weight:700;backdrop-filter:none;padding:9px 13px;}
  .lock-btn:hover, .wishlist-btn:hover, .settings-btn:hover{background:transparent;border-color:var(--gold);color:var(--lava-deep);}

  /* --- category pills: minimal, hairline circles --- */
  .cat-pill-icon{box-shadow:none;border:1px solid var(--line);background:var(--card);}
  .cat-pill-label{color:var(--charcoal);letter-spacing:.3px;}

  /* --- section titles: upright serif with gold tick --- */
  .section-title{font-style:normal;font-weight:600;letter-spacing:.3px;font-size:18px;}
  .section-head{align-items:center;}
  .section-head::after{content:'';flex:1;height:1px;background:var(--line);margin-inline-start:14px;}

  /* --- product & hcard cards: gallery cards, square corners, hairline --- */
  .product, .hcard{border-radius:4px;box-shadow:none;border:1px solid var(--line);}
  .product:hover, .hcard:hover{box-shadow:0 10px 26px rgba(60,42,24,.10);border-color:var(--gold);}
  .product .img-box, .hcard-img{border-radius:0;}
  .product .p-type{font-family:'Fraunces', serif;font-size:14.5px;font-weight:600;}
  .hcard-name{font-family:'Fraunces', serif;font-weight:600;}
  .p-brand, .pd-brand{letter-spacing:1.2px;}
  .new-badge{border-radius:0;letter-spacing:1px;background:var(--ink);color:var(--gold);}
  .wish-heart, .hcard-heart{border-radius:0;border:1px solid var(--line);background:var(--card);box-shadow:none;}

  /* --- big banner sections --- */
  .cat-banner{border-radius:0;margin:18px -14px;}
  .cat-banner-title{letter-spacing:.5px;}
  .cat-banner-btn{border-radius:0;}

  /* --- view all / load more --- */
  .view-all-btn{border-radius:0;border-width:1px;border-color:var(--gold);background:transparent;padding:16px;}
  .view-all-btn:hover{background:var(--ink);border-color:var(--ink);color:var(--cream);}

  /* --- page headers (category / all products) --- */
  .page-header{padding:26px 4px 16px;}
  .page-eyebrow{letter-spacing:3px;font-size:10px;}
  .page-title{font-size:30px;}
  .page-title::after{content:'';display:block;width:44px;height:1px;background:var(--gold);margin:12px auto 0;}
  .back-btn{color:var(--charcoal);font-size:12px;letter-spacing:1.5px;text-transform:uppercase;}
  .back-btn:hover{color:var(--lava-deep);}

  /* --- sheets & modals: soft cream panel, centered serif titles --- */
  .sheet{border-radius:18px 18px 0 0;border-top:1px solid var(--line);}
  .sheet h3{font-family:'Fraunces', serif;font-weight:600;text-align:center;font-size:20px;}
  .sheet h3::after{content:'';display:block;width:36px;height:1px;background:var(--gold);margin:10px auto 0;}
  .btn{border-radius:2px;letter-spacing:.5px;}
  .btn-primary{background:var(--ink);color:var(--cream);}
  .btn-primary:hover{filter:brightness(1.12);}
  html[data-theme="dark"] .btn-primary{color:#171009;}
  .btn-ghost{border:1px solid var(--gold);color:var(--ink);}
  .btn-ghost:hover{background:var(--gold-soft);}
  .field input[type=text], .field input[type=password], .field input[type=search], .field textarea, .all-search{border-radius:4px;}
  .field input:focus, .field textarea:focus, .all-search:focus{border-color:var(--gold);outline:none;}
  .field label{letter-spacing:.3px;color:var(--lava-deep);font-weight:700;font-size:12px;}

  /* --- menu drawer: clean list with hairline dividers, no boxes --- */
  .menu-sheet-header{justify-content:center;margin-bottom:6px;}
  .menu-sheet-header .msh-badge{display:none;}
  .menu-list{gap:0;margin-bottom:4px;}
  .menu-item{background:transparent;border:none;border-radius:0;box-shadow:none;border-bottom:1px solid var(--line);padding:16px 6px;transition:none;}
  .menu-item:hover{background:transparent;border-color:var(--line);transform:none;box-shadow:none;}
  .menu-item:hover .mi-label{color:var(--lava-deep);}
  .menu-item .mi-icon{background:transparent;width:auto;height:auto;border-radius:0;color:var(--lava-deep);}
  .menu-item .mi-icon svg{width:19px;height:19px;stroke-width:1.5;}
  .menu-item.mi-danger .mi-icon{background:transparent;}
  .menu-item .mi-label{font-size:14.5px;letter-spacing:.2px;}
  .menu-divider{margin:0;height:0;}
  .brand-pill{border-radius:0;}
  .brand-pill.active, .brand-pill:hover{color:#241a13;}

  /* --- footer with inline theme switcher --- */
  .site-footer{margin:36px -14px 0;padding:26px 18px 30px;border-top:1px solid var(--line);text-align:center;background:var(--cream);}
  .theme-inline{display:flex;justify-content:center;align-items:stretch;gap:0;margin-bottom:14px;}
  .theme-opt{background:none;border:none;border-bottom:2px solid transparent;color:var(--charcoal);font-family:inherit;font-size:12px;letter-spacing:1px;padding:7px 14px;cursor:pointer;font-weight:700;}
  .theme-opt.active{color:var(--ink);border-bottom-color:var(--gold);}
  .theme-sep{width:1px;background:var(--line);margin:7px 0;}
  .footer-copy{font-size:11px;color:var(--charcoal);opacity:.65;letter-spacing:1.5px;margin:0;text-transform:uppercase;}

  /* --- option list (language picker) --- */
  .opt-item{border-radius:4px;}
  .opt-item.active{background:transparent;}

  /* --- theme row inside the Menu drawer: plain inline, no box --- */
  .menu-theme{display:flex;justify-content:center;align-items:stretch;gap:0;padding:14px 0 4px;}
  .menu-theme .theme-opt{font-size:12.5px;}

  /* --- luxe brandmark lockup --- */
  .brandmark{position:relative;margin:6px 0 0;}
  .brand-orn{display:flex;align-items:center;justify-content:center;gap:12px;}
  .brand-orn i{display:block;width:52px;height:1px;background:linear-gradient(90deg,transparent,var(--gold));}
  .brand-orn i:last-of-type{background:linear-gradient(90deg,var(--gold),transparent);}
  .brand-orn b{color:var(--gold);font-size:9px;line-height:1;font-weight:400;transform:translateY(-.5px);}
  .brand-orn-b{margin-top:16px;}
  .brand-name{font-family:'Fraunces', serif;font-weight:500;font-size:42px;letter-spacing:7px;margin:14px 0 0;padding-inline-start:7px;
    background:linear-gradient(180deg, #e9cf98 0%, #cba569 45%, #a9803f 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:var(--lava-deep);}
  .brand-sub{font-size:10.5px;letter-spacing:8px;color:var(--charcoal);margin:9px 0 0;font-weight:700;padding-inline-start:8px;}
  html[data-theme="light"] .brand-name{background:linear-gradient(180deg, #8a6a35 0%, #a9803f 55%, #6e5327 100%);-webkit-background-clip:text;background-clip:text;}

  /* --- dark-first polish: hairlines glow slightly gold on black --- */
  html[data-theme="dark"] .product:hover, html[data-theme="dark"] .hcard:hover{box-shadow:0 12px 30px rgba(0,0,0,.5);}
  html[data-theme="dark"] .site-footer{background:var(--cream);}
  html[data-theme="dark"] .cat-pill-icon{background:var(--sand);}
  html[data-theme="dark"] .sheet{background:#120d07;border-top-color:var(--line);}
  html[data-theme="dark"] .field input, html[data-theme="dark"] .field textarea, html[data-theme="dark"] .all-search, html[data-theme="dark"] .catalog-search{background:var(--sand);color:var(--ink);border-color:var(--line);}
  html[data-theme="dark"] .img-upload .preview, html[data-theme="dark"] .banner-upload{background:var(--sand);}
  html[data-theme="dark"] .login-screen input{background:var(--sand);color:var(--ink);}
</style>
</head>

// ---------- Simple page routing (home / one category / all products) ----------
// Tapping a category (pill, banner, or "view all") no longer just scrolls —
// it moves to its own page, like a real multi-page site, while staying a
// single HTML file. The URL hash keeps it bookmarkable and back-button-safe.
function parseHash(){
  const h = decodeURIComponent(location.hash.replace(/^#/, ''));
  if(h.startsWith('category/')) return { type: 'category', id: h.slice('category/'.length) };
  if(h === 'all') return { type: 'all' };
  return { type: 'home' };
}
let currentView = parseHash();
function navigateTo(view){
  const hash = view.type === 'category' ? `category/${view.id}` : (view.type === 'all' ? 'all' : '');
  if(location.hash.replace(/^#/, '') === hash){
    currentView = view;
    renderPage();
    window.scrollTo(0, 0);
  } else {
    location.hash = hash; // onhashchange below picks this up
  }
}
window.addEventListener('hashchange', ()=>{
  currentView = parseHash();
  renderPage();
  window.scrollTo(0, 0);
});

function compressImage(file, opts){
  opts = opts || {};
  const maxDim = opts.maxDim || 1400;
  const maxBytes = opts.maxBytes || (700 * 1024);
  const startQuality = opts.quality || 0.95;
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        let {width, height} = img;
        if(width > height && width > maxDim){ height = Math.round(height*(maxDim/width)); width = maxDim; }
        else if(height > maxDim){ width = Math.round(width*(maxDim/height)); height = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);

        // Try high quality first, but step down if a very detailed photo would
        // push this document too close to Firestore's 1MB-per-document limit.
        let quality = startQuality;
        let dataUrl = canvas.toDataURL('image/jpeg', quality);
        while(dataUrl.length > maxBytes && quality > 0.5){
          quality -= 0.1;
          dataUrl = canvas.toDataURL('image/jpeg', quality);
        }
        resolve(dataUrl);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

const IMGBB_API_KEY = "43f3a0b60e3426f5d3b085738df44e98";

// Uploads a compressed image (data URL) to ImgBB and returns a hosted URL.
// If the upload fails for any reason (offline, key issue, etc.), falls back
// to the original data URL so the app keeps working exactly as before.
async function uploadToImgBB(dataUrl){
  try{
    const base64 = dataUrl.split(',')[1];
    const form = new FormData();
    form.append('key', IMGBB_API_KEY);
    form.append('image', base64);
    const res = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: form });
    const json = await res.json();
    if(json && json.success && json.data && json.data.url){
      return json.data.url;
    }
    console.error('ImgBB upload failed, using local image instead', json);
    return dataUrl;
  }catch(err){
    console.error('ImgBB upload error, using local image instead', err);
    return dataUrl;
  }
}

// ---------- Firestore sync ----------
// Categories now hold only their own fields (name, createdAt).
// Each category's products live in a SUBCOLLECTION (categories/{id}/products)
// instead of a single array field, so a category document never grows past
// Firestore's 1MB limit no matter how many products it has.
db.collection('categories').orderBy('createdAt', 'asc').onSnapshot((snapshot)=>{
  const order = snapshot.docs.map(d=>d.id);
  const incomingIds = new Set(order);

  // add / update categories, and start a products listener for new ones
  snapshot.docs.forEach(doc=>{
    let cat = categories.find(c=>c.id===doc.id);
    if(!cat){
      cat = { id: doc.id, products: [], productLimit: PRODUCT_BATCH_SIZE, hasMoreProducts: false, loadingMore: false, ...doc.data() };
      categories.push(cat);
      watchProducts(doc.id);
    } else {
      Object.assign(cat, doc.data());
    }
  });

  // remove categories that no longer exist, and stop their listeners
  categories = categories.filter(c=>{
    if(incomingIds.has(c.id)) return true;
    if(productUnsubs[c.id]){ productUnsubs[c.id](); delete productUnsubs[c.id]; }
    return false;
  });

  // keep display order matching Firestore's createdAt order
  categories.sort((a,b)=> order.indexOf(a.id) - order.indexOf(b.id));

  loaded = true;
  renderPage();
}, (err)=>{
  console.error(err);
  loaded = true;
  renderPage();
});

const PRODUCT_BATCH_SIZE = 24; // how many products load per category at a time

function watchProducts(categoryId){
  const cat = categories.find(c=>c.id===categoryId);
  if(!cat) return;
  if(cat.productLimit === undefined) cat.productLimit = PRODUCT_BATCH_SIZE;

  // if we were already listening (e.g. "load more" was clicked), stop the old
  // listener first and start a new one with the bigger limit
  if(productUnsubs[categoryId]) productUnsubs[categoryId]();

  productUnsubs[categoryId] = db.collection('categories').doc(categoryId).collection('products')
    .orderBy('createdAt', 'asc')
    .limit(cat.productLimit)
    .onSnapshot((snap)=>{
      const c = categories.find(x=>x.id===categoryId);
      if(!c) return;
      c.products = snap.docs.map(d=>({ id: d.id, ...d.data() }));
      // if we got exactly as many docs as we asked for, there may be more —
      // show a "load more" button rather than assuming this is everything
      c.hasMoreProducts = snap.docs.length === c.productLimit;
      c.loadingMore = false;
      renderPage();
    }, (err)=> console.error(err));
}

function loadMoreProducts(categoryId){
  const cat = categories.find(c=>c.id===categoryId);
  if(!cat) return;
  cat.loadingMore = true;
  cat.productLimit = (cat.productLimit || PRODUCT_BATCH_SIZE) + PRODUCT_BATCH_SIZE;
  renderPage(); // show the loading state immediately
  watchProducts(categoryId);
}

function flashStatus(state){

  renderPage();
  setTimeout(()=>{ if(saveState===state){ saveState="idle"; renderPage(); } }, 1500);
}

    await db.collection('categories').add({ name, icon: icon || null, createdAt: Date.now() });

  }catch(err){ console.error(err); flashStatus("error"); }
}
async function deleteCategoryFn(id){
  if(!confirm("ئایا دڵنیایت لە سڕینەوەی ئەم مۆدێلە و هەموو کاڵاکانی؟")) return;
  flashStatus("saving");
  try{
    // delete every product doc in the subcollection first (Firestore doesn't cascade-delete)
    const prodSnap = await db.collection('categories').doc(id).collection('products').get();
    const batch = db.batch();
    prodSnap.docs.forEach(d=> batch.delete(d.ref));
    batch.delete(db.collection('categories').doc(id));
    await batch.commit();
    if(productUnsubs[id]){ productUnsubs[id](); delete productUnsubs[id]; }
    flashStatus("saved");
  }catch(err){ console.error(err); flashStatus("error"); }
}
async function renameCategoryFn(id, name, icon, banners){
  flashStatus("saving");
  try{
    const updates = { name };
    if(icon !== undefined) updates.icon = icon;
    if(banners !== undefined) updates.banners = banners;
    await db.collection('categories').doc(id).update(updates);
    flashStatus("saved");
  }catch(err){ console.error(err); flashStatus("error"); }
}
async function addProductFn(categoryId, product){
  flashStatus("saving");
  try{
    // image stays as a compressed base64 string INSIDE this product's own document.
    // Since each product now has its own doc (not a shared array), a single
    // product's image (usually 50-150KB) is nowhere close to Firestore's 1MB
    // per-document limit — no paid Storage bucket needed.
    await db.collection('categories').doc(categoryId).collection('products').add({
      name: product.name,
      price: product.price,
      brand: product.brand || null,
      images: product.images || (product.image ? [product.image] : []),
      image: product.image || (product.images && product.images[0]) || null,
      note: product.note || null,
      customerNote: product.customerNote || null,
      featured: product.featured || false,
      createdAt: Date.now()
    });
    flashStatus("saved");
  }catch(err){ console.error(err); flashStatus("error"); }
}
async function deleteProductFn(categoryId, productId){
  flashStatus("saving");
  try{
    await db.collection('categories').doc(categoryId).collection('products').doc(productId).delete();
    flashStatus("saved");
  }catch(err){ console.error(err); flashStatus("error"); }
}
async function updateProductFn(categoryId, productId, updates){
  flashStatus("saving");

    await db.collection('categories').doc(categoryId).collection('products').doc(productId).update({
      name: updates.name,

      image: updates.image || (updates.images && updates.images[0]) || null,

}

// The grid re-renders on its own (not via renderPage()) when the visitor
// types, so the search box never loses focus mid-keystroke. ----------
let allProductsQuery = '';
function filteredAllProducts(){
  const q = allProductsQuery.trim().toLowerCase();
  const all = getAllProductsFlat();
  if(!q) return all;
  return all.filter(p=> (p.name||'').toLowerCase().includes(q) || (p.brand||'').toLowerCase().includes(q));
}
function allProductsGridHtml(){
  const list = filteredAllProducts();
  if(!list.length) return `<div class="empty-cats">${t('noneFound')}</div>`;
  return `<div class="products">${list.map(p=> productCardHtml(p, p.catId)).join('')}</div>`;
}
function renderAllProductsGrid(){
  const gridWrap = document.getElementById('allProductsGridWrap');
  if(!gridWrap) return;
  gridWrap.innerHTML = allProductsGridHtml();
  bindGridInteractions(gridWrap);
}
function allProductsPageHtml(){
  return `
    <div class="page-header">
      <button class="back-btn" id="backBtn">→ ${t('backHome')}</button>
      <p class="page-eyebrow">Collection</p>
      <p class="page-title">${t('allProducts')}</p>

  `;
}

// Wires the interactive buttons (view/edit/delete/wish) inside a single
// grid container — used by allProductsPageHtml's live search re-render so
// it doesn't need a full renderPage() (which would drop input focus).
function bindGridInteractions(root){
  root.querySelectorAll('[data-del-prod]').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      const [catId, prodId] = btn.getAttribute('data-del-prod').split('|');
      deleteProductFn(catId, prodId);
    };
  });
  root.querySelectorAll('[data-edit-prod]').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      const [catId, prodId] = btn.getAttribute('data-edit-prod').split('|');
      const cat = categories.find(c=>c.id===catId);
      const prod = cat && (cat.products||[]).find(p=>p.id===prodId);
      if(prod) openEditProductModal(catId, prod);
    };
  });
  bindViewProdButtons(root);
  bindWishButtons(root);
}

function renderPage(){
  const statusText = saveState==="saving" ? "پاشەکەوت دەکرێت…"
    : saveState==="saved" ? "پاشەکەوت کرا ✓"
    : saveState==="error" ? "هەڵە لە پاشەکەوتکردن" : "";

  // if a category page is open for a model that no longer exists, bounce home
  if(currentView.type==='category' && loaded && !categories.find(c=>c.id===currentView.id)){
    currentView = { type: 'home' };
  }

  let bodyHtml;
  if(currentView.type === 'category'){
    bodyHtml = categoryPageHtml(currentView.id, statusText);
  } else if(currentView.type === 'all'){
    bodyHtml = allProductsPageHtml();
  } else {
    bodyHtml = homePageHtml(statusText);
  }

  pageEl.innerHTML = `<div class="wrap">${bodyHtml}</div>`;

  // attach listeners
  const backBtn = document.getElementById('backBtn');
  if(backBtn) backBtn.onclick = ()=> navigateTo({ type: 'home' });

  const viewAllBtn = document.getElementById('viewAllBtn');
  if(viewAllBtn) viewAllBtn.onclick = ()=> navigateTo({ type: 'all' });

  const allSearchInput = document.getElementById('allSearchInput');
  if(allSearchInput){
    allSearchInput.addEventListener('input', ()=>{
      allProductsQuery = allSearchInput.value;
      renderAllProductsGrid();
    });
  }

  const menuBtn = document.getElementById('menuBtn');
  if(menuBtn) menuBtn.onclick = openMenuModal;

  const promoBtn = document.getElementById('promoBtn');
  if(promoBtn) promoBtn.onclick = openPromoModal;

  const addModelBtn = document.getElementById('addModelBtn');
  if(addModelBtn) addModelBtn.onclick = openNewCategoryModal;

  const settingsBtn = document.getElementById('settingsBtn');
  if(settingsBtn) settingsBtn.onclick = openSiteSettingsModal;

  const wishlistBtn = document.getElementById('wishlistBtn');
  if(wishlistBtn) wishlistBtn.onclick = openWishlistModal;

  const heroCta = document.getElementById('heroCta');
  if(heroCta) heroCta.onclick = ()=>{
    const firstCat = categories[0];
    if(firstCat) navigateTo({ type: 'category', id: firstCat.id });
  };

  pageEl.querySelectorAll('[data-open-cat]').forEach(el=>{
    el.onclick = ()=> navigateTo({ type: 'category', id: el.getAttribute('data-open-cat') });
  });


  pageEl.querySelectorAll('[data-edit-cat]').forEach(btn=>{
    btn.onclick = ()=>{
      const id = btn.getAttribute('data-edit-cat');
      const cat = categories.find(c=>c.id===id);
      openEditCategoryModal(id, cat ? cat.name : "", cat ? cat.icon : null, cat ? ((cat.banners && cat.banners.length) ? cat.banners : (cat.banner ? [cat.banner] : [])) : []);
    };
  });
  pageEl.querySelectorAll('[data-del-cat]').forEach(btn=>{
    btn.onclick = ()=> deleteCategoryFn(btn.getAttribute('data-del-cat'));
  });
  pageEl.querySelectorAll('[data-add-prod]').forEach(el=>{
    el.onclick = ()=> openNewProductModal(el.getAttribute('data-add-prod'));
  });
  pageEl.querySelectorAll('[data-load-more]').forEach(btn=>{
    btn.onclick = ()=> loadMoreProducts(btn.getAttribute('data-load-more'));
  });

  bindGridInteractions(pageEl);
}

            </label>
          </div>
          <p class="hint" id="socialIconRemove" style="display:none;cursor:pointer;color:var(--danger);">سڕینەوەی وێنە</p>
          <p class="hint">ئەگەر وێنە زیاد نەکەیت ئایکۆنی ئۆتۆماتیک بەکاردێت</p>
        </div>
        <button class="btn btn-ghost" id="socialAddBtn" style="width:100%;margin-bottom:6px;">＋ زیادکردنی هەژمار</button>

        <div class="sheet-actions">
          <button class="btn btn-ghost" id="settingsClose" style="flex:1">${t('close')}</button>
        </div>
      </div>
    </div>
  `;
  const ov = document.getElementById('ovSettings');
  const sheet = document.getElementById('sheetSettings');
  ov.onclick = closeModal;
  sheet.onclick = (e)=> e.stopPropagation();
  document.getElementById('settingsClose').onclick = closeModal;

  const fileInput = document.getElementById('logoFile');
  const preview = document.getElementById('logoPreview');
  const uploadLabel = document.getElementById('logoUploadLabel');
  fileInput.addEventListener('change', async (e)=>{
    const file = e.target.files && e.target.files[0];
    if(!file) return;
    uploadLabel.firstChild.textContent = "بارکردن... ";
    try{
      // logo is small and shown at ~76px, so compress it much smaller than product photos
      const compressed = await compressImage(file, { maxDim: 400, quality: 0.9, maxBytes: 200*1024 });
      const hostedUrl = await uploadToImgBB(compressed);
      preview.innerHTML = `<img src="${hostedUrl}" alt="لۆگۆ"/>`;
      await updateLogo(hostedUrl);
      openSiteSettingsModal(); // re-open so the "remove logo" option appears
    }catch(err){
      console.error(err);
      uploadLabel.firstChild.textContent = "هەڵبژاردنی لۆگۆ ";
    }
  });

  const removeBtn = document.getElementById('logoRemove');
  if(removeBtn) removeBtn.onclick = async ()=>{
    await updateLogo(null);
    openSiteSettingsModal();
  };

  document.getElementById('locationSaveBtn').onclick = async ()=>{
    const v = document.getElementById('locationInput').value.trim();
    await updateLocation(v);
  };
  document.getElementById('taglineSaveBtn').onclick = async ()=>{
    const text = document.getElementById('taglineInput').value.trim();
    if(!text) return;
    await updateTagline(text);
  };

  let pendingSocialIcon = null;
  const socialIconFile = document.getElementById('socialIconFile');
  const socialIconPreview = document.getElementById('socialIconPreview');
  const socialIconUploadLabel = document.getElementById('socialIconUploadLabel');
  const socialIconRemove = document.getElementById('socialIconRemove');
  socialIconFile.addEventListener('change', async (e)=>{
    const file = e.target.files && e.target.files[0];
    if(!file) return;
    socialIconUploadLabel.firstChild.textContent = "بارکردن... ";
    try{
      const compressed = await compressImage(file, { maxDim: 200, quality: 0.9, maxBytes: 150*1024 });
      const hostedUrl = await uploadToImgBB(compressed);
      pendingSocialIcon = hostedUrl;
      socialIconPreview.innerHTML = `<img src="${hostedUrl}" alt=""/>`;
      socialIconRemove.style.display = "block";
    }catch(err){
      console.error(err);
    }finally{
      socialIconUploadLabel.firstChild.textContent = "هەڵبژاردنی وێنە ";
    }
  });
  socialIconRemove.onclick = ()=>{
    pendingSocialIcon = null;
    socialIconPreview.innerHTML = `<span style="font-size:18px;opacity:.4">🔗</span>`;
    socialIconRemove.style.display = "none";
  };

  document.getElementById('socialAddBtn').onclick = async ()=>{
    const label = document.getElementById('socialLabel').value.trim();
    const url = document.getElementById('socialUrl').value.trim();
    if(!label || !url) return;
    await addSocialLink(label, url, pendingSocialIcon);
    openSiteSettingsModal();
  };

  sheet.querySelectorAll('[data-del-social]').forEach(btn=>{
    btn.onclick = async ()=>{
      await deleteSocialLink(btn.getAttribute('data-del-social'));
      openSiteSettingsModal();
    };
  });
}

function wireSimpleModal(ovId, sheetId, cancelId, submitId, inputId, onSave){

function openProductFormModal(categoryId, existing){
  const isEdit = !!existing;
  const MAX_IMAGES = 6;
  // backward-compatible: older products only have `image`, newer ones have `images` array
  let imageList = existing ? (existing.images && existing.images.length ? [...existing.images] : (existing.image ? [existing.image] : [])) : [];

  function galleryHtml(){
    return `
      <div class="gallery-grid" id="galleryGrid">
        ${imageList.map((url,i)=>`
          <div class="gallery-thumb">
            <img src="${url}" alt="وێنە ${i+1}"/>
            <button type="button" class="gallery-thumb-del" data-del-img="${i}">✕</button>
          </div>
        `).join('')}
        ${imageList.length < MAX_IMAGES ? `
          <label class="gallery-add" id="galleryAddLabel">
            <span style="font-size:20px;line-height:1;">＋</span>
            <span style="font-size:11px;">زیادکردنی وێنە</span>
            <input type="file" accept="image/*" style="display:none" id="prodFile" />
          </label>
        ` : ``}
      </div>
      <p class="hint">${imageList.length}/${MAX_IMAGES} وێنە. یەکەم وێنە وەکوو وێنەی سەرەکی دەردەکەوێت.</p>
    `;
  }

  modalRoot.innerHTML = `
    <div class="overlay" id="ovProd">
      <div class="sheet" id="sheetProd">
        <h3>${isEdit ? 'دەستکاریکردنی کاڵا' : 'زیادکردنی کاڵا'}</h3>
        <div class="field">
          <label>وێنەکانی کاڵا (تا ٦ وێنە)</label>
          <div id="galleryWrap">${galleryHtml()}</div>
        </div>
        <div class="field">
          <label>براند (ئارەزوومەندانەیە)</label>
          <input type="text" id="prodBrand" placeholder="نموونە: The Ordinary" value="${isEdit && existing.brand ? esc(existing.brand) : ''}" />
        </div>
        <div class="field">
          <label>جۆری کاڵا</label>
          <input type="text" id="prodName" placeholder="نموونە: مۆدێلی ١ - درێژ" value="${isEdit ? esc(existing.name) : ''}" />
        </div>
        <div class="field">
          <label>نرخی کاڵا (تەنها بۆ خۆت — بۆ کڕیاران پیشان نادرێت)</label>
          <input type="text" inputmode="numeric" id="prodPrice" placeholder="نموونە: ١٥٠٠٠" value="${isEdit ? esc(existing.price) : ''}" />
        </div>
        <div class="field">
          <label>تێبینی admin (ئارەزوومەندانەیە)</label>
          <textarea id="prodNote" rows="2" placeholder="نموونە: ڕەنگی جێگای بابەت، بڕی ماوە...">${isEdit && existing.note ? esc(existing.note) : ''}</textarea>
          <p class="hint">ئەم تێبینییە تەنها بۆ admin دەردەکەوێت، بۆ کڕیار نیشان نادرێت.</p>
        </div>
        <div class="field">
          <label>تێبینی بۆ کڕیار (ئارەزوومەندانەیە)</label>
          <textarea id="prodCustomerNote" rows="2" placeholder="نموونە: چۆنیەتی بەکارهێنان، تایبەتمەندی بابەت...">${isEdit && existing.customerNote ? esc(existing.customerNote) : ''}</textarea>
          <p class="hint">ئەم تێبینییە بۆ کڕیار دەردەکەوێت. ئەگەر هەر ڕستەیەک لە دێڕێکی جیاواز بنووسیت، وەکوو لیستی تایبەتمەندی پیشان دەدرێت.</p>
        </div>
        <div class="field">
          <label class="field-check">
            <input type="checkbox" id="prodFeatured" ${isEdit && existing.featured ? 'checked' : ''} />
            <span>پیشاندان لە بەشی "بەرهەمی نوێ"ی سەرەکی</span>
          </label>
        </div>
        <div class="sheet-actions">
          <button class="btn btn-ghost" id="prodCancel">پاشگەزبوونەوە</button>
          <button class="btn btn-primary" id="prodSubmit">${isEdit ? 'پاشەکەوتکردن' : 'زیادکردن'}</button>
        </div>
      </div>
    </div>
  `;
  const ov = document.getElementById('ovProd');
  const sheet = document.getElementById('sheetProd');
  ov.onclick = closeModal;
  sheet.onclick = (e)=> e.stopPropagation();
  document.getElementById('prodCancel').onclick = closeModal;

  const galleryWrap = document.getElementById('galleryWrap');

  function refreshGallery(){
    galleryWrap.innerHTML = galleryHtml();
    bindGalleryEvents();
  }
  function bindGalleryEvents(){
    const fileInput = document.getElementById('prodFile');
    if(fileInput){
      fileInput.addEventListener('change', async (e)=>{
        const file = e.target.files && e.target.files[0];
        if(!file) return;
        const addLabel = document.getElementById('galleryAddLabel');
        if(addLabel) addLabel.querySelector('span:last-of-type').textContent = 'بارکردن...';
        try{
          const compressed = await compressImage(file, { maxDim: 1600, quality: 0.92, maxBytes: 900*1024 });
          const url = await uploadToImgBB(compressed);
          imageList.push(url);
          refreshGallery();
        }catch(err){
          if(addLabel) addLabel.querySelector('span:last-of-type').textContent = 'زیادکردنی وێنە';
        }
      });
    }
    galleryWrap.querySelectorAll('[data-del-img]').forEach(btn=>{
      btn.onclick = ()=>{
        imageList.splice(parseInt(btn.getAttribute('data-del-img'),10), 1);
        refreshGallery();
      };
    });
  }
  bindGalleryEvents();

  async function submit(){
    const name = document.getElementById('prodName').value.trim();
    const price = document.getElementById('prodPrice').value.trim();
    const brand = document.getElementById('prodBrand').value.trim();
    const note = document.getElementById('prodNote').value.trim();
    const customerNote = document.getElementById('prodCustomerNote').value.trim();
    const featured = document.getElementById('prodFeatured').checked;
    if(!name || !price) return;
    const submitBtn = document.getElementById('prodSubmit');
    submitBtn.disabled = true;
    submitBtn.textContent = "پاشەکەوتکردن...";
    const payload = {
      name, price, brand: brand || null,
      images: imageList,
      image: imageList[0] || null, // kept for backward compatibility with any older code paths
      note: note || null,
      customerNote: customerNote || null,
      featured: featured
    };
    if(isEdit){
      await updateProductFn(categoryId, existing.id, payload);
    } else {
      await addProductFn(categoryId, payload);
    }
    closeModal();
  }
  document.getElementById('prodSubmit').onclick = submit;
}

function openWishlistModal(){
  const list = getWishlist();
  const items = list.map(w=>{
    const cat = categories.find(c=>c.id===w.catId);
    const p = cat && (cat.products||[]).find(x=>x.id===w.prodId);
    return p ? {...p, catId: w.catId} : null;
  }).filter(Boolean);
  const waUrl = findWhatsappUrl();
  modalRoot.innerHTML = `
    <div class="overlay" id="ovWish">
      <div class="sheet" id="sheetWish">
        <h3>دڵخوازەکان</h3>
        ${items.length===0 ? `
          <p style="text-align:center;color:var(--charcoal);opacity:.7;padding:16px 4px 24px;line-height:1.8;">هێشتا هیچ کاڵایەکت زیاد نەکردووە بۆ دڵخوازەکان.<br/>کلیک لەسەر 🤍 لەسەر هەر کاڵایەک بکە بۆ زیادکردنی بۆ ئێرە.</p>
        ` : `
          <div class="wish-list">
            ${items.map(p=>`
              <div class="wish-item">
                <div class="wish-img">${firstImage(p) ? `<img src="${firstImage(p)}" alt="${esc(p.name)}"/>` : `<span class="ph">${PH_ICON}</span>`}</div>
                <div class="wish-info">
                  <p class="wish-name">${esc(p.name)}</p>
                  ${isAdmin && p.price ? `<p class="wish-price">${esc(p.price)}</p>` : ``}
                </div>
                <button class="icon-btn danger" data-wish-del="${p.catId}|${p.id}" title="سڕینەوە">✕</button>
              </div>
            `).join('')}
          </div>
        `}
        <div class="sheet-actions">
          <button class="btn btn-ghost" id="wishClose">${t('close')}</button>
          ${items.length && waUrl ? `<a class="btn btn-primary" style="text-decoration:none;display:flex;align-items:center;justify-content:center;" href="${esc(waUrl)}" target="_blank" rel="noopener noreferrer">ناردنی داواکاری 💬</a>` : ``}
        </div>
      </div>

  `;
  const ov = document.getElementById('ovWish');
  const sheet = document.getElementById('sheetWish');
  ov.onclick = closeModal;
  sheet.onclick = (e)=> e.stopPropagation();
  document.getElementById('wishClose').onclick = closeModal;

    btn.onclick = ()=>{
      const [catId, prodId] = btn.getAttribute('data-wish-del').split('|');
      toggleWishlist(catId, prodId);
      openWishlistModal();
    };
  });

function openLanguageModal(){
  let pending = lang;
  function optHtml(val, label){
    return `<button class="opt-item ${pending===val?'active':''}" data-lang-opt="${val}"><span class="opt-dot"></span><span class="opt-label">${label}</span></button>`;
  }
  function draw(){
    modalRoot.innerHTML = `
      <div class="overlay" id="ovLang">
        <div class="sheet" id="sheetLang">
          <h3>${t('language')}</h3>
          <p class="sheet-sub">${t('langSub')}</p>

            ${optHtml('ku', '🟡 کوردی')}
            ${optHtml('ar', '🟢 العربية')}
          </div>
          <div class="sheet-actions">
            <button class="btn btn-ghost" id="langClose">${t('close')}</button>
            <button class="btn btn-primary" id="langApply">${t('apply')}</button>
          </div>
        </div>
      </div>
    `;
    const ov = document.getElementById('ovLang');
    const sheet = document.getElementById('sheetLang');
    ov.onclick = closeModal;
    sheet.onclick = (e)=> e.stopPropagation();
    document.getElementById('langClose').onclick = closeModal;
    modalRoot.querySelectorAll('[data-lang-opt]').forEach(btn=>{
      btn.onclick = ()=>{ pending = btn.getAttribute('data-lang-opt'); draw(); };
    });
    document.getElementById('langApply').onclick = ()=>{
      setLang(pending);
      closeModal();
    };
  }
  draw();
}

// ---------- About us (text + photos + videos; admin can edit) ----------
function videoEmbedHtml(url){
  const u = String(url || '').trim();
  const yt = u.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([\w-]{6,})/);
  if(yt) return `<iframe class="about-video" src="https://www.youtube.com/embed/${yt[1]}" allowfullscreen loading="lazy"></iframe>`;
  return `<video class="about-video" src="${esc(u)}" controls preload="metadata"></video>`;
}

function openAboutEditModal(){
  let images = [...(aboutData.images||[])];
  let videos = [...(aboutData.videos||[])];
  function draw(){
    modalRoot.innerHTML = `
      <div class="overlay" id="ovAboutEdit">
        <div class="sheet" id="sheetAboutEdit">
          <h3>دەستکاری — دەربارەی ئێمە</h3>
          <div class="field">
            <label>دەق / تێبینی</label>
            <textarea id="aboutText" rows="5" placeholder="دەربارەی کۆمپانیاکەت بنووسە...">${esc(aboutData.text || '')}</textarea>
          </div>
          <div class="field">
            <label>وێنەکان</label>
            <div class="gallery-grid">
              ${images.map((url,i)=>`
                <div class="gallery-thumb about-edit-thumb">
                  <img src="${esc(url)}" alt=""/>
                  <button class="gallery-thumb-del" data-del-about-img="${i}">✕</button>
                </div>`).join('')}
              <label class="gallery-add" id="aboutImgAdd">
                <span style="font-size:20px;">＋</span><span style="font-size:10.5px;">زیادکردنی وێنە</span>
                <input type="file" accept="image/*" multiple style="display:none" id="aboutImgFile"/>
              </label>
            </div>
          </div>
          <div class="field">
            <label>ڤیدیۆکان (لینکی YouTube یان لینکی ڤیدیۆی ڕاستەوخۆ mp4)</label>
            ${videos.map((v,i)=>`
              <div class="video-row"><span class="vr-url">${esc(v)}</span><button data-del-about-vid="${i}">✕ سڕینەوە</button></div>
            `).join('')}
            <div style="display:flex;gap:8px;">
              <input type="text" id="aboutVidInput" placeholder="https://youtube.com/watch?v=..." style="flex:1;direction:ltr;text-align:left;"/>
              <button class="btn btn-ghost" id="aboutVidAdd" style="flex:0 0 auto;padding:11px 16px;">＋ زیادکردن</button>
            </div>
          </div>
          <div class="sheet-actions">
            <button class="btn btn-ghost" id="aboutEditCancel">پاشگەزبوونەوە</button>
            <button class="btn btn-primary" id="aboutEditSave">پاشەکەوتکردن</button>
          </div>
        </div>
      </div>
    `;
    const ov = document.getElementById('ovAboutEdit');
    const sheet = document.getElementById('sheetAboutEdit');
    ov.onclick = closeModal;
    sheet.onclick = (e)=> e.stopPropagation();
    document.getElementById('aboutEditCancel').onclick = ()=> openAboutModal();

    modalRoot.querySelectorAll('[data-del-about-img]').forEach(btn=>{
      btn.onclick = ()=>{
        const savedText = document.getElementById('aboutText').value;
        images.splice(parseInt(btn.getAttribute('data-del-about-img'),10),1);
        draw();
        document.getElementById('aboutText').value = savedText;
      };
    });
    modalRoot.querySelectorAll('[data-del-about-vid]').forEach(btn=>{
      btn.onclick = ()=>{
        const savedText = document.getElementById('aboutText').value;
        videos.splice(parseInt(btn.getAttribute('data-del-about-vid'),10),1);
        draw();
        document.getElementById('aboutText').value = savedText;
      };
    });

    document.getElementById('aboutImgFile').addEventListener('change', async (e)=>{
      const files = Array.from(e.target.files || []);
      if(!files.length) return;
      const savedText = document.getElementById('aboutText').value;
      const addLabel = document.getElementById('aboutImgAdd');
      addLabel.firstElementChild.textContent = '⏳';
      for(const file of files){
        try{
          const compressed = await compressImage(file, { maxDim: 1400, quality: 0.9, maxBytes: 600*1024 });
          const hostedUrl = await uploadToImgBB(compressed);
          images.push(hostedUrl);
        }catch(err){ console.error(err); }
      }
      draw();
      document.getElementById('aboutText').value = savedText;
    });

    document.getElementById('aboutVidAdd').onclick = ()=>{
      const input = document.getElementById('aboutVidInput');
      const v = input.value.trim();
      if(!v) return;
      const savedText = document.getElementById('aboutText').value;
      videos.push(v);
      draw();
      document.getElementById('aboutText').value = savedText;
    };

    document.getElementById('aboutEditSave').onclick = async ()=>{
      const text = document.getElementById('aboutText').value.trim();
      flashStatus('saving');
      try{
        await db.collection('settings').doc('about').set({ text, images, videos });
        aboutData = { text, images, videos };
        flashStatus('saved');
        openAboutModal();
      }catch(err){ console.error(err); flashStatus('error'); }
    };
  }
  draw();
}

// ---------- Auto-cycle product photos (any card whose product has 2+ images) ----------
setInterval(()=>{
  document.querySelectorAll('img[data-cycle]').forEach(img=>{
    const urls = img.getAttribute('data-cycle').split('|').filter(Boolean);
    if(urls.length < 2) return;
    const next = (parseInt(img.dataset.cycleI || '0', 10) + 1) % urls.length;
    img.dataset.cycleI = String(next);
    img.src = urls[next];
  });
}, 4000);
</script>
